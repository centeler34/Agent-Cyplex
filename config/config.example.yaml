agent-v0:
  version: "1.0"

  daemon:
    # Socket/PID paths are auto-detected per platform at runtime.
    # Linux:  /tmp/agent-v0.sock, /tmp/agent-v0.pid
    # macOS:  ~/.agent-v0/agent-v0.sock, ~/.agent-v0/agent-v0.pid
    # Override here if needed:
    # socket_path: "/tmp/agent-v0.sock"
    # pid_file: "/tmp/agent-v0.pid"
    heartbeat_interval_ms: 5000
    log_level: "info"
    log_path: "~/.agent-v0/logs/"

  sessions:
    default_workspace_root: "~/.agent-v0/workspaces/"
    auto_archive_after_days: 90

  gateway:
    default_provider: "anthropic"
    fallback_provider: "openai"
    timeout_ms: 30000
    max_retries: 3
    # auth_mode: "api_key" (default) or "subscription"
    #
    # Subscription mode lets you use your existing paid subscription login
    # instead of managing separate API keys:
    #   • anthropic  → routes through `claude` CLI (Claude Pro/Team)
    #   • openai     → uses ChatGPT session token (ChatGPT Plus/Pro/Team)
    #   • gemini     → uses gcloud ADC OAuth (Google One AI Premium)
    providers:
      anthropic:
        model: "claude-sonnet-4-6"
        key_ref: "anthropic_api_key"
        # auth_mode: "subscription"  # uncomment to use Claude subscription via CLI
      openai:
        model: "gpt-4o"
        key_ref: "openai_api_key"
        # auth_mode: "subscription"  # uncomment to use ChatGPT subscription
        # key_ref: "chatgpt_access_token"  # set this when using subscription mode
      gemini:
        model: "gemini-pro"
        key_ref: "google_ai_api_key"
        # auth_mode: "subscription"  # uncomment to use gcloud ADC (run: gcloud auth application-default login)
      claude_code:
        # Routes requests through the Claude Code CLI.
        # No API key needed — uses the ambient Claude Code authentication.
        model: "claude-sonnet-4-6"

      # ── Chinese AI Providers ─────────────────────────────────────────
      # All use OpenAI-compatible APIs via the openai npm package.
      # deepseek:
      #   model: "deepseek-chat"          # or deepseek-reasoner (chain-of-thought)
      #   key_ref: "deepseek_api_key"
      #   base_url: "https://api.deepseek.com"
      # zhipu:
      #   model: "glm-4.5-flash"          # free; or codegeex-4, glm-4.7, glm-4.7-flash (free)
      #   key_ref: "zhipu_api_key"        # format: {id}.{secret}
      #   base_url: "https://open.bigmodel.cn/api/paas/v4/"
      # moonshot:
      #   model: "moonshot-v1-auto"        # or kimi-k2.5, moonshot-v1-128k
      #   key_ref: "moonshot_api_key"
      #   base_url: "https://api.moonshot.cn/v1"
      # dashscope:
      #   model: "qwen-plus"              # or qwen3-coder-plus, qwen-max, qwen-turbo
      #   key_ref: "dashscope_api_key"
      #   base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
      #   # China endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
      # baidu:
      #   model: "ernie-4.5"              # or ernie-4.0-turbo, ernie-x1 (reasoning)
      #   key_ref: "qianfan_api_key"      # OpenAI-compatible key (bce-v3/...), not legacy AK/SK
      #   base_url: "https://qianfan.baidubce.com/v2"

  agents:
    agentic:
      enabled: true
      model_override: "anthropic/claude-opus-4-6"
      max_concurrent_delegations: 10

    recon:
      enabled: true
      workspace: "workspaces/recon/"
      skills:
        - recon.subdomain_enum
        - recon.dns_sweep
        - recon.tech_fingerprint
      permissions:
        network.allow:
          - "*.shodan.io"
          - "crt.sh"
          - "*.censys.io"
          - "dns.google"
          - "web.archive.org"
        fs.write: ["workspaces/recon/"]
        fs.execute: false

    code:
      enabled: true
      workspace: "workspaces/code/"
      permissions:
        fs.execute: true
        execute.allowed_binaries:
          # Auto-detected at runtime based on platform.
          # Linux:  /usr/bin/python3, /usr/local/bin/node
          # macOS (Apple Silicon): /opt/homebrew/bin/python3, /opt/homebrew/bin/node
          - "/usr/bin/python3"
          - "/usr/local/bin/node"
        network.allow: []

    exploit_research:
      enabled: true
      workspace: "workspaces/exploit_research/"
      permissions:
        network.allow:
          - "nvd.nist.gov"
          - "cve.mitre.org"
        fs.execute: false

    report:
      enabled: true
      workspace: "workspaces/reports/"
      permissions:
        fs.write: ["workspaces/reports/"]
        network.allow: []
        fs.execute: false

    monitor:
      enabled: true
      workspace: "workspaces/monitor/"

    osint_analyst:
      enabled: true
      workspace: "workspaces/osint/"

    threat_intel:
      enabled: true
      workspace: "workspaces/threat_intel/"

    forensics:
      enabled: true
      workspace: "workspaces/forensics/"

    scribe:
      enabled: true
      workspace: "workspaces/scribe/"

  bots:
    telegram:
      enabled: false
      token_key_ref: "telegram_bot_token"
      allowlist: []
    discord:
      enabled: false
      token_key_ref: "discord_bot_token"
    whatsapp:
      enabled: false

  security:
    audit_log_path: "~/.agent-v0/audit/audit.jsonl"
    keystore_path: "~/.agent-v0/keystore.enc"
    kdf: "argon2id"
    session_token_ttl_hours: 24
    skill_signature_verification: true

  rate_limits:
    global_tokens_per_minute: 500000
    per_agent_tokens_per_minute: 100000
    bot_messages_per_user_per_minute: 20
